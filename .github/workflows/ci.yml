name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test module loading
        run: node -e "import('./dist/adapters/registry.js').then(m => { const r = new m.AdapterRegistry(); console.log('Registry OK, adapters:', r.getAll().map(a => a.name).join(', ')); })"

      - name: Test config module
        run: node -e "import('./dist/config.js').then(m => { m.ensureDataDir(); console.log('Config OK:', JSON.stringify(m.loadConfig())); })"

      - name: Test commandExists (platform-specific)
        run: node -e "import('./dist/adapters/claude.js').then(async m => { const exists = await m.commandExists('node'); console.log('commandExists(node):', exists); if (!exists) { console.error('FAIL: commandExists should find node'); process.exit(1); } })"

      - name: Test spawnOpts shell flag
        run: >
          node -e "
            import('./dist/adapters/claude.js').then(m => {
              const opts = m.spawnOpts('/tmp');
              const isWin = process.platform === 'win32';
              console.log('platform:', process.platform);
              console.log('spawnOpts.shell:', opts.shell);
              if (isWin && !opts.shell) {
                console.error('FAIL: spawnOpts must set shell=true on Windows');
                process.exit(1);
              }
              if (!isWin && opts.shell) {
                console.error('FAIL: spawnOpts should not set shell=true on non-Windows');
                process.exit(1);
              }
              console.log('spawnOpts shell flag: PASS');
            })
          "

      - name: Test spawn with shell (Windows .cmd simulation)
        if: runner.os == 'Windows'
        run: >
          node -e "
            import { spawn } from 'child_process';
            import('./dist/adapters/claude.js').then(m => {
              const opts = m.spawnOpts();
              const proc = spawn('where', ['node'], { ...opts, stdio: 'pipe' });
              let out = '';
              proc.stdout.on('data', c => out += c);
              proc.on('close', code => {
                console.log('where node:', out.trim());
                if (code !== 0) { console.error('FAIL: spawn where node failed'); process.exit(1); }
                console.log('Windows spawn with shell: PASS');
              });
            })
          "

      - name: Test spawn without shell should fail on Windows
        if: runner.os == 'Windows'
        run: >
          node -e "
            import { spawn } from 'child_process';
            const proc = spawn('where', ['node'], { stdio: 'pipe' });
            proc.on('error', err => {
              if (err.code === 'ENOENT') {
                console.log('PASS: spawn without shell correctly fails with ENOENT on Windows');
                process.exit(0);
              }
              process.exit(1);
            });
            proc.on('close', code => {
              console.log('NOTE: where works without shell on this runner (Git Bash in PATH)');
              console.log('spawnOpts shell:true is still required for .cmd wrappers');
            });
          "
